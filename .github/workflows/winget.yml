name: Publish to WinGet
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v2.5.0)'
        required: true
jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: SaeraSoft.CaesiumCLT
          max-versions-to-keep: 10
          installers-regex: '\.zip$'
          release-tag: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.RELEASE_TOKEN }}
